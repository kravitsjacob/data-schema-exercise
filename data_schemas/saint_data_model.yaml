# ---------------------------------------------------------------------------
# 2. What It Is & What It Covers
# ---------------------------------------------------------------------------
summary:
  description: |
    The SAInt data model structures multi-energy infrastructure as networks
    (directed graphs of elementary and auxiliary objects with geometric,
    topological, relational, and static properties), scenarios (simulation type,
    time window, settings, controls, constraints, and profiles), and solutions
    (variables at each calculated time step; base results in files, derived
    results on demand). It supports integrated planning and analysis across
    electricity and gas for generation, transmission, and distribution
    planners who need one coherent representation instead of siloed sector
    data. Its users are industry professionals at utilities, in
    consulting, and at system operators who run simulations and optimizations
    and exchange network, scenario, and solution artifacts.

  modeling_domains_supported: |
    - Capacity Expansion
    - Production Cost (nodal)
    - Production Cost (zonal)
    - Balanced Three Phase AC Power Flow (steady-state)
    - Balanced Three Phase AC Power Flow (timeseries)
    - Unbalanced Three Phase AC Power Flow (steady-state)
    - Unbalanced Three Phase AC Power Flow (timeseries)
    - Steady-state Gas Hydraulic
    - Dynamic Gas Hydraulic
    - Thermal Hydraulic

  what_does_it_NOT_cover: |
    Electric Dynamics (phasor/emt)

  data_captured: |
    - grid topology
    - device parameters
    - time series
    - investment costs
    - operating constraints

  conceptual_structure: |
    The network is a directed graph of typed elementary objects (nodes,
    branches, externals) plus auxiliary objects that subset or relate them,
    carrying geometric, topological, relational, and static properties. Equipment 
    types specialize through inheritance (e.g., a fuel generator is
    a generator, which is an external), so shared fields live on general types
    and specifics on subtypes—separate from how objects connect in the graph.
    Scenarios and time-step solutions layer on that same object graph, so the
    model is graph-based and object-oriented rather than a flat bus-table or
    purely relational layout.

