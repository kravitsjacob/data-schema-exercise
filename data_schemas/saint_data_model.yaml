# ---------------------------------------------------------------------------
# 2. What It Is & What It Covers
# ---------------------------------------------------------------------------
summary:
  description: |
    The SAInt data model structures multi-energy infrastructure as networks
    (directed graphs of elementary and auxiliary objects with geometric,
    topological, relational, and static properties), scenarios (simulation type,
    time window, settings, controls, constraints, and profiles), and solutions
    (variables at each calculated time step; base results in files, derived
    results on demand). It supports integrated planning and analysis across
    electricity and gas for generation, transmission, and distribution
    planners who need one coherent representation instead of siloed sector
    data. Its users are industry professionals at utilities, research organizations, in
    consulting, and at system operators who run simulations and optimizations
    and exchange network, scenario, and solution artifacts.

  modeling_domains_supported: |
    - Capacity Expansion
    - Production Cost (nodal)
    - Production Cost (zonal)
    - Balanced Three Phase AC Power Flow (steady-state)
    - Balanced Three Phase AC Power Flow (timeseries)
    - Unbalanced Three Phase AC Power Flow (steady-state)
    - Unbalanced Three Phase AC Power Flow (timeseries)
    - Steady-state Gas Hydraulic
    - Dynamic Gas Hydraulic
    - Thermal Hydraulic

  what_does_it_NOT_cover: |
    - Electric Dynamics (phasor/emt)

  data_captured: |
    - grid topology
    - device parameters
    - time series
    - investment costs
    - operating constraints

  conceptual_structure: |
    The network is a directed graph of typed elementary objects (nodes,
    branches, externals) plus auxiliary objects that subset or relate them,
    carrying geometric, topological, relational, and static properties. Equipment
    types specialize through inheritance (e.g., a fuel generator is
    a generator, which is an external), so shared fields live on general types
    and specifics on subtypes—separate from how objects connect in the graph.
    Scenarios and time-step solutions layer on that same object graph, so the
    model is graph-based and object-oriented rather than a flat bus-table or
    purely relational layout.

# ---------------------------------------------------------------------------
# 3. Key Design Decisions
# ---------------------------------------------------------------------------
design:
  key_decisions:
    - decision: |
        Separate "what" from "how": the network holds the physical / structural
        "what" (topology, parameters, static properties); scenarios hold the
        mathematical and operational "how" (study type, solver assumptions,
        settings, controls, constraints, profiles).
      rationale: |
        Integrated planning workflows need to reuse one network across many
        studies while swapping or aligning assumptions between domains
        (e.g., electric vs gas vs thermal scenarios). Keeping the network
        stable and pushing formulation choices to the scenario layer lets
        teams move assumptions between scenarios without duplicating or
        rewriting the underlying asset model.

    - decision: |
        Separate base results from derived results: base results (fundamental
        outputs from the simulation or optimization) are persisted in the
        solution file; derived results are computed on demand from those bases
        (lazy evaluation) and are not pre-written to disk.
      rationale: |
        Users do not need to declare every quantity they might inspect before
        the run. They can execute a study, then explore charts, tables, and
        aggregates afterward without rerunning or resizing output upfront,
        at the cost of a short wait when a derived view is first requested.

  schema_format: ~

  implementation_languages: ~

  database_storage_backend: ~

  interoperability:
    imports_from:
      - ASCII templates
      - dot-raw
      - cyme
      - synergi gas
    exports_to:
      - ASCII templates
      - dot-raw
  data_tool_relation: Some tool specific

  extensibility: |
    The core schema is extended only by the vendor in product
    releases (no fork-and-modify). Types use specialization (subclassing)
    within the shipped software. Users extend behavior through the API and
    plugins (e.g., GUI visualizations), not by altering the persisted schema.

  units_handling: |
    A built-in units library defines supported quantities and conversions.
    Users choose their preferred units for input and display; the software
    converts consistently between them so values stay coherent across the model.

  validation_approach: |
    Validation runs continuously as users edit: invalid entries are blocked
    before they are accepted, including cross-field rules (e.g., a maximum
    cannot be below its minimum) and graph consistency (e.g., a branch must
    reference valid nodes). On import, records that fail validation are
    rejected and the issues are logged so users can correct the source data.

  governance: ~

